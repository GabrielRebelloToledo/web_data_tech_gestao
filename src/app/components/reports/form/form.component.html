<app-shell activePage="relatorios" pageTitle="Cadastro de Relatório"
           [breadcrumbs]="[{label:'Relatórios', route:'/relatorios'},{label:'Cadastro'}]">
<div class="container mt-4">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <label class="form-label">Código do Relatório</label>
        <input formControlName="id" class="form-control" type="text" style="width: 150px;">

        <label class="form-label"><i style="color: red;">* </i>Nome do Relatório</label>
        <input formControlName="nome" class="form-control" type="text" style="width: 350px;">

        <label class="form-label"><i style="color: red;">* </i>Tipo do Relatório</label>
        <select formControlName="type" class="form-select" style="width: 150px;">
            <option value="PDF">PDF</option>
            <option value="XLS">XLS</option>
            <option value="XLSX">XLSX</option>
        </select>

        <button type="submit" class="btn btn-success mt-5">Salvar</button>
        <button type="button" class="btn btn-success mx-5 mt-5" (click)="visualizar()">Visualizar</button>
    </form>

    <mat-tab-group (selectedTabChange)="onTabChange($event)" style="width: 400px;" class="mt-4">
        <mat-tab label="Arquivos">
            <nav class="mt-4">
                <ul>
                    <li>
                        <div class="custom-file-upload btn btn-success-outline">
                            <i class="fa fa-upload action-icon" (click)="triggerFileInput('arquivo')"></i>
                            <input type="file" [id]="'file-input-update'" formControlName="arquivo"
                                (change)="onFileSelected($event, 'arquivo')" hidden>
                        </div>
                    </li>
                </ul>
                <ul>
                    <li>
                        <a class="btn btn-danger" (click)="onDeleteFile()"> Remover</a>
                    </li>
                </ul>
                <ul>
                    <li>
                        <a class="btn btn-warning" (click)="onDownloadFile()"> Download</a>
                    </li>
                </ul>
            </nav>
        </mat-tab>

    </mat-tab-group>

    <table class="table table-hover table-responsible">
        <thead>

            <tr>
                <th scope="col">Selecionar</th>
                <th scope="col">Cód. Anexo</th>
                <th scope="col">Arquivo</th>
                <th scope="col">Mestre</th>
            </tr>

        </thead>

        <tbody>

            <tr *ngFor="let dados of listReportFiles">
                <td><input type="checkbox" (change)="onCheckboxSelectChange($event, dados)">
                <th scope="row">{{dados.id}}</th>
                <td>{{dados.arquivo}}</td>
                <td><input type="checkbox" [checked]="dados.mestre == 1" (change)="onCheckboxChange($event, dados)">
                </td>
            </tr>

        </tbody>

    </table>

</div>



@if (!spinner) {<app-loading [mensagemCarregamento]="mensagemCarregamento"/>}

@if (ok) {<app-mensage-ok />}

@if (erro) {<app-mensage-error [mensagem]="mensagemErro" />}




<div class="popup-overlay" *ngIf="abrirParametro">
    <div class="popup-content p-5">

        <div class="d-flex justify-content-end">
            <i class="fa fa-times pointer" (click)="fecharPopupParametros()"></i>
        </div>

        <div class="d-flex justify-content-start">
            Parâmetros
        </div>
        <hr>

        <form [formGroup]="formRelatorio" (ngSubmit)="onSubmit()">

            <div *ngFor="let field of fields" class="p-2">
                <div *ngIf="field.type != 'select'">
                    <label class="form-label" [hidden]="!field.visible">
                        <i *ngIf="field.required" style="color: red;">*</i>{{ field.placeholder }}
                    </label>
                </div>

                <input class="form-control"
                    *ngIf="field.type !== 'select' && field.type !== 'check' && field.type !== 'file' &&  field.type !== 'txtarea'"
                    [type]="field.type" formControlName="{{ field.name }}" placeholder="{{ field.placeholder }}"
                    [hidden]="!field.visible"
                    [class.is-invalid]="form.get(field.name)?.invalid && form.get(field.name)?.touched">

                <textarea class="form-control" *ngIf="field.type === 'txtarea'" formControlName="{{ field.name }}"
                    [class.is-invalid]="form.get(field.name)?.invalid && form.get(field.name)?.touched"></textarea>

                <div class="form-check" *ngIf="field.type == 'check'" [hidden]="!field.visible">
                    <input type="checkbox" class="form-check-input" formControlName="{{ field.name }}"
                        [class.is-invalid]="form.get(field.name)?.invalid && form.get(field.name)?.touched">
                </div>

                <div class="invalid-feedback"
                    *ngIf="form.get(field.name)?.hasError('required') && form.get(field.name)?.touched">
                    Campo obrigatório
                </div>
            </div>

            <div class="text-end mt-4">
                <button type="button" class="btn btn-success" [disabled]="form.invalid"
                    (click)="gerarRelatorio()">Enviar</button>
            </div>
        </form>
    </div>
</div>
</app-shell>

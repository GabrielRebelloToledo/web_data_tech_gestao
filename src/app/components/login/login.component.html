<div class="d-flex justify-content-center align-items-center vh-100 bg-light">
    <div class="card shadow-lg p-4 rounded" style="width: 350px;">
        <div class="text-center mb-4">
            <h4 class="fw-bold text-primary">Acesso ao Sistema</h4>
            <p class="text-muted">Entre com suas credenciais</p>
        </div>
        <form [formGroup]="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                    <input type="text" class="form-control" id="email" placeholder="email@example.com" formControlName="email">
                </div>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Senha</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" id="password" placeholder="••••••••" formControlName="password">
                </div>
            </div>
            <div class="d-grid">
                <button class="btn btn-primary" (click)="login()">Acessar</button>
            </div>
        </form>
    </div>
</div>


<mat-card class="form-container">
    <mat-card-title>{{ true ? 'Editar Perfil' : 'Novo Produto' }}</mat-card-title>
    <form [formGroup]="dataForm" (ngSubmit)="saveStatus()">

        <!-- Cód. do Usuário -->
        <mat-form-field appearance="fill" class="form-field">
            <mat-label>Cód. do Usuário</mat-label>
            <input matInput formControlName="id" readonly />
            <mat-error *ngIf="dataForm.get('id')?.hasError('required')">Este campo é obrigatório.</mat-error>
        </mat-form-field>

        <!-- Nome do Usuário -->
        <mat-form-field appearance="fill" class="form-field">
            <mat-label>Nome do Usuário</mat-label>
            <input matInput formControlName="name" required />
            <mat-error *ngIf="dataForm.get('name')?.hasError('required')">Nome é obrigatório.</mat-error>
        </mat-form-field>

        <!-- E-mail -->
        <mat-form-field appearance="fill" class="form-field">
            <mat-label>E-mail</mat-label>
            <input matInput formControlName="email" required email />
            <mat-error *ngIf="dataForm.get('email')?.hasError('required')">E-mail é obrigatório.</mat-error>
            <mat-error *ngIf="dataForm.get('email')?.hasError('email')">Digite um e-mail válido.</mat-error>
        </mat-form-field>

        <!-- Senha -->
        <mat-form-field appearance="fill" class="form-field">
            <mat-label>Senha</mat-label>
            <input matInput formControlName="password" type="password" />
        </mat-form-field>

        <!-- Grupo -->
<!--         <mat-form-field appearance="fill" class="form-field">
            <mat-label>Grupo</mat-label>
            
            
            <mat-select formControlName="type" required [disabled]="isReadonly">
              <mat-option *ngFor="let rolea of rolesGroup" [value]="rolea.value">
                {{ rolea.viewValue }}
              </mat-option>
            </mat-select>
            
            <mat-error *ngIf="dataForm.get('type')?.hasError('required')">Grupo é obrigatório.</mat-error>
          </mat-form-field> -->
          

        <!-- Ativo -->
       <!--  <mat-form-field appearance="fill" class="form-field">
            <mat-label>Ativo</mat-label>
            <mat-select formControlName="active" required>
                <mat-option *ngFor="let role of roles" [value]="role.value">
                    {{ role.viewValue }}
                </mat-option>
            </mat-select>
            <mat-error *ngIf="dataForm.get('active')?.hasError('required')">Status é obrigatório.</mat-error>
        </mat-form-field> -->

        <!-- Botões -->
        <div class="buttons">
            <button mat-raised-button color="primary" type="submit" [disabled]="dataForm.invalid" class="action-btn">
                {{ editMode ? 'Atualizar' : 'Salvar' }}
            </button>
            <!-- <button mat-raised-button color="warn" type="button" (click)="close()" class="action-btn">
                Cancelar
            </button> -->
        </div>

    </form>
</mat-card>

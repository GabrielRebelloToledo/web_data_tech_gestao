<!-- Botão de Fechar -->
<p style="margin-left: 15px; cursor: pointer;margin-top: 10px;">
    <i class="fa fa-times action-icon pointer" (click)="fechar()"></i>
</p>

<div class="container-fluid mt-3">
    <div class="d-flex justify-content-between align-items-center">
        <!-- Botões de Ação -->
        <div>
            <a class="btn btn-success" (click)="verFormulario()" *ngIf="table">
                <i class="bi-plus-circle bi-3x" style="cursor: pointer;"></i>
                Cadastrar Empresa
            </a>
            <a class="btn btn-warning" (click)="verDepartametos()" *ngIf="!table">
                <i class="bi-table bi-3x" style="cursor: pointer;"></i>
                Ver Empresas
            </a>
            <a class="btn btn-primary" (click)="pesquisaEmpresasCadastradas()" style="margin-left: 5px;">
                <i class="bi-arrow-clockwise bi-3x" style="cursor: pointer;"></i>
                Atualizar Dados
            </a>
        </div>

        <!-- Carregando (Loading) -->
        <div *ngIf="loading" class="d-flex align-items-center">
            <span>Carregando...</span>
            <div class="spinner-border spinner-border-sm ms-2" role="status">
                <span class="visually-hidden">Carregando...</span>
            </div>
        </div>
    </div>

    <div *ngIf="table" class="mt-3">
        <!-- Tabela de Departamentos -->
        <table class="table table-hover table-responsive">
            <thead>
                <tr>
                    <th scope="col">Cód. Empresa</th>
                    <th scope="col">Empresa</th>
                    <th scope="col">Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let comd of usercomp">
                    <th scope="row">{{comd.id}}</th>
                    <th scope="row">{{comd.name}}</th>
                    <td>
                        <i class="bi-trash" style="cursor: pointer;" (click)="deleteUser(comd.id)"></i>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <div *ngIf="!table" class="w-50 mt-4">
        <!-- Formulário de Cadastro de Empresa no Usuário -->
        <h6>Cadastrar Empresa</h6>
        <form [formGroup]="form" (ngSubmit)="vincularDepartamento()">
            <div class="mb-3">
                <label for="userId" class="form-label">Usuário</label>
                <input type="number" class="form-control" id="userId" formControlName="userId" readonly>
            </div>

            <div class="mb-3">
                <label for="selectform" class="form-label">Empresa</label>
                <select id="selectform" class="form-select form-select" aria-label="Small select example"
                    formControlName="companieId">
                    <option value="" disabled selected>Abra o menu de seleção</option>
                    <option *ngFor="let companies of companiesdep" [value]="companies.id">{{ companies.name }}</option>
                </select>
            </div>

            <button type="submit" class="btn btn-success">Enviar</button>
        </form>
    </div>
</div>

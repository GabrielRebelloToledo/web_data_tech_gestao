<app-shell activePage="kb" pageTitle="Base de Conhecimento"
           [breadcrumbs]="[{label:'Administração'},{label:'Base de Conhecimento'}]">

  <section class="list-page">
    <header class="list-page__header">
      <div>
        <h2 class="list-page__title">Base de Conhecimento</h2>
        <p class="list-page__subtitle">Soluções pré-definidas usadas na triagem por IA e pelos atendentes.</p>
      </div>
      <div class="list-page__actions">
        <label class="search">
          <span class="material-symbols-rounded icon-sm">search</span>
          <input type="search"
                 placeholder="Buscar por título, empresa, setor..."
                 [ngModel]="searchTerm()"
                 (ngModelChange)="onSearchChange($event)" />
        </label>
        <button class="icon-btn" (click)="loadArticles()" title="Atualizar" aria-label="Atualizar">
          <span class="material-symbols-rounded icon-md">refresh</span>
        </button>
        <button class="btn-primary-brand" (click)="openDynamicForm()">
          <span class="material-symbols-rounded icon-sm">add</span>
          Novo artigo
        </button>
      </div>
    </header>

    <!-- Loading -->
    <div class="list-page__skeleton card-surface" *ngIf="loading()">
      <div class="skeleton-row" *ngFor="let i of [0,1,2,3,4]">
        <app-skeleton width="60px" height="18px"></app-skeleton>
        <app-skeleton width="30%" height="18px"></app-skeleton>
        <app-skeleton width="20%" height="18px"></app-skeleton>
        <app-skeleton width="20%" height="18px"></app-skeleton>
        <app-skeleton width="10%" height="18px"></app-skeleton>
      </div>
    </div>

    <!-- Empty -->
    <div class="card-surface list-page__empty" *ngIf="!loading() && articles().length === 0">
      <app-empty-state
        icon="library_books"
        title="Nenhum artigo cadastrado"
        description="Use o botão Novo artigo para iniciar o cadastro.">
      </app-empty-state>
    </div>

    <!-- Grid -->
    <div class="list-page__grid card-surface" *ngIf="!loading() && articles().length">
      <ag-grid-angular
        class="admin-ag-grid"
        [rowData]="articles()"
        [columnDefs]="colDefs"
        [defaultColDef]="defaultColDef"
        [theme]="gridTheme()"
        [localeText]="localeText"
        [rowHeight]="56"
        [headerHeight]="48"
        [animateRows]="true"
        [pagination]="true"
        [paginationPageSize]="15"
        [paginationPageSizeSelector]="[10, 15, 25, 50, 100]"
        [suppressCellFocus]="true"
        (gridReady)="onGridReady($event)">
      </ag-grid-angular>
    </div>
  </section>
</app-shell>
